<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="../assets/favicon_io/favicon.ico">
    <title>404 | Page Not Found</title>
    <style>
        :root {
            --bg: #f5f9f6;
            --text: #123d22;
            --muted: #4f6f5b;
            --accent: #2f8860;
            --accent-2: #3db37a;
            --card: #ffffff;
            --shadow: 0 18px 45px rgba(18, 61, 34, 0.14);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 15% 20%, rgba(61, 179, 122, 0.22), transparent 35%),
                radial-gradient(circle at 85% 25%, rgba(47, 136, 96, 0.2), transparent 35%),
                var(--bg);
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .card {
            width: min(920px, 100%);
            background: var(--card);
            border-radius: 22px;
            box-shadow: var(--shadow);
            overflow: hidden;
            display: grid;
            grid-template-columns: 1.1fr 1fr;
        }

        .visual {
            background: linear-gradient(145deg, #1f5c42, #2f8860);
            color: #fff;
            display: grid;
            place-items: center;
            padding: 36px;
            position: relative;
            overflow: hidden;
        }

        .bubble {
            position: absolute;
            border-radius: 999px;
            opacity: 0.2;
            animation: float 7s ease-in-out infinite;
        }

        .bubble.one {
            width: 120px;
            height: 120px;
            background: #fff;
            top: 16%;
            left: 12%;
        }

        .bubble.two {
            width: 78px;
            height: 78px;
            background: #9ff3cb;
            bottom: 18%;
            right: 14%;
            animation-delay: 1.2s;
        }

        .bubble.three {
            width: 46px;
            height: 46px;
            background: #f5fff9;
            top: 64%;
            left: 22%;
            animation-delay: 2s;
        }

        .code {
            font-size: clamp(4rem, 9vw, 7rem);
            font-weight: 900;
            line-height: 1;
            letter-spacing: 1px;
            position: relative;
            z-index: 1;
            animation: pulse 2.2s ease-in-out infinite;
        }

        .panel {
            padding: clamp(26px, 4vw, 40px);
            display: grid;
            align-content: center;
            gap: 14px;
        }

        .panel h1 {
            font-size: clamp(1.5rem, 3vw, 2.1rem);
            line-height: 1.2;
        }

        .panel p {
            color: var(--muted);
            line-height: 1.6;
            font-size: 0.98rem;
        }

        .actions {
            margin-top: 10px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            text-decoration: none;
            border-radius: 10px;
            padding: 11px 16px;
            font-weight: 700;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
            border: 1px solid transparent;
        }

        .btn-home {
            background: linear-gradient(90deg, var(--accent), var(--accent-2));
            color: #fff;
            box-shadow: 0 10px 20px rgba(47, 136, 96, 0.25);
        }

        .btn-back {
            border-color: #cde4d8;
            color: var(--text);
            background: #fff;
        }

        .btn:hover {
            transform: translateY(-1px);
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-12px);
            }
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.03);
            }
        }

        @media (max-width: 768px) {
            .card {
                grid-template-columns: 1fr;
            }

            .visual {
                min-height: 180px;
            }
        }
    </style>
</head>

<body>
    <main class="card" role="main">
        <section class="visual" aria-hidden="true">
            <span class="bubble one"></span>
            <span class="bubble two"></span>
            <span class="bubble three"></span>
            <div class="code">404</div>
        </section>

        <section class="panel">
            <h1>Page not found</h1>
            <p>
                The page you requested does not exist or may have been moved.
                Use one of the actions below to continue.
            </p>
            <div class="actions">
                <a class="btn btn-home" href="/">Back Home</a>
                <a class="btn btn-back" href="javascript:history.back()">Go Back</a>
            </div>
        </section>
    </main>
</body>

</html>
